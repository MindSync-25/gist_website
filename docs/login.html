<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log in to Gist</title>
  <link rel="stylesheet" href="global.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; }

    /* NAV */
    .nav-links { display: flex; }

    /* MAIN */
    .login-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 5vw 60px;
      background: linear-gradient(135deg, var(--blue-50) 0%, var(--white) 60%);
    }

    .login-card {
      background: var(--white);
      border: 1px solid var(--blue-100);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      padding: 3rem 2.5rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .login-logo {
      font-family: var(--font-display);
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--blue-700);
      letter-spacing: -1px;
      margin-bottom: 1.5rem;
      display: block;
      text-decoration: none;
    }
    .login-logo .dot { color: var(--blue-500); }

    .login-title {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--slate-900);
      margin-bottom: .5rem;
    }

    .login-sub {
      color: var(--slate-500);
      font-size: .95rem;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    /* Spinner state */
    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--blue-100);
      border-top-color: var(--blue-600);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner-label {
      font-size: .9rem;
      color: var(--slate-500);
    }

    /* Fallback buttons — hidden until JS shows them */
    .fallback { display: none; flex-direction: column; gap: .75rem; }
    .fallback.visible { display: flex; }

    .btn-store {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      padding: .85rem 1.5rem;
      border-radius: var(--radius-md);
      font-size: .95rem;
      font-weight: 500;
      text-decoration: none;
      transition: all var(--transition);
    }
    .btn-store--android {
      background: var(--blue-600);
      color: var(--white);
      box-shadow: 0 2px 8px rgba(37,99,235,.25);
    }
    .btn-store--android:hover {
      background: var(--blue-700);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(37,99,235,.35);
    }
    .btn-store--ios {
      background: var(--slate-900);
      color: var(--white);
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    .btn-store--ios:hover {
      background: var(--slate-700);
      transform: translateY(-1px);
    }

    .divider {
      display: flex; align-items: center; gap: .75rem;
      color: var(--slate-300); font-size: .82rem;
      margin: .25rem 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--slate-100);
    }

    .desktop-note {
      display: none;
      color: var(--slate-500);
      font-size: .88rem;
      line-height: 1.5;
      margin-top: 1.25rem;
    }
    .desktop-note.visible { display: block; }

    @media (max-width: 480px) {
      .login-card { padding: 2rem 1.5rem; border-radius: var(--radius-lg); }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <a href="index.html" class="nav-logo">gist<span class="dot">.</span></a>
    <ul class="nav-links">
      <li><a href="features.html">Features</a></li>
      <li><a href="safety.html">Safety</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
    <div class="nav-cta">
      <a href="login.html" class="btn-ghost" style="color: var(--blue-600);">Log in</a>
      <a href="https://play.google.com/store/apps/details?id=com.gist.app" target="_blank" rel="noopener" class="btn-primary">Download</a>
    </div>
    <button class="hamburger" id="hamburger">&#9776;</button>
  </nav>

  <!-- LOGIN CARD -->
  <main class="login-wrap">
    <div class="login-card">
      <a href="index.html" class="login-logo">gist<span class="dot">.</span></a>

      <h1 class="login-title" id="card-title">Opening Gist&hellip;</h1>
      <p class="login-sub" id="card-sub">Taking you to the app to log in.</p>

      <!-- Spinner shown while attempting deep link -->
      <div class="spinner-wrap" id="spinner-wrap">
        <div class="spinner"></div>
        <span class="spinner-label">Launching app&hellip;</span>
      </div>

      <!-- Fallback buttons shown after timeout -->
      <div class="fallback" id="fallback">
        <a id="btn-android"
           href="https://play.google.com/store/apps/details?id=com.gist.app"
           class="btn-store btn-store--android"
           target="_blank" rel="noopener">
          &#9654;&nbsp; Open on Android
        </a>
        <div class="divider">or</div>
        <a id="btn-ios"
           href="https://apps.apple.com/app/gist/id6738290829"
           class="btn-store btn-store--ios"
           target="_blank" rel="noopener">
          &#xf179;&nbsp; Open on iPhone
        </a>
        <div class="divider">or</div>
        <a href="https://app.gistverse.com/auth/sign-in"
           class="btn-store btn-store--android"
           style="background: var(--slate-700)">
          &#127760;&nbsp; Continue on Web
        </a>
      </div>

      <!-- Desktop-only note -->
      <p class="desktop-note" id="desktop-note">
        For the best experience, download Gist on your phone. Or continue on the web version.
      </p>
    </div>
  </main>

  <script>
    (function () {
      var ua = navigator.userAgent || '';
      var isAndroid = /android/i.test(ua);
      var isIOS = /iphone|ipad|ipod/i.test(ua);
      var isMobile = isAndroid || isIOS;

      var PLAY_STORE = 'https://play.google.com/store/apps/details?id=com.gist.app';
      var APP_STORE  = 'https://apps.apple.com/app/gist/id6738290829';

      // Deep link to the sign-in screen inside the app
      var DEEP_LINK_ANDROID = 'intent://auth/sign-in#Intent;scheme=gist;package=com.gist.app;end';
      var DEEP_LINK_IOS     = 'gist://auth/sign-in';

      var spinnerWrap  = document.getElementById('spinner-wrap');
      var fallback     = document.getElementById('fallback');
      var cardTitle    = document.getElementById('card-title');
      var cardSub      = document.getElementById('card-sub');
      var desktopNote  = document.getElementById('desktop-note');
      var btnAndroid   = document.getElementById('btn-android');
      var btnIOS       = document.getElementById('btn-ios');

      function showFallback() {
        spinnerWrap.style.display = 'none';
        fallback.classList.add('visible');
        cardTitle.textContent = 'Get the Gist app';
        cardSub.textContent   = 'Log in or sign up on Android or iPhone.';
      }

      if (isAndroid) {
        // Android intent URL opens app if installed; falls back to Play Store automatically
        window.location.href = DEEP_LINK_ANDROID;
        // Show fallback in case intent doesn't fire (e.g. some browsers)
        setTimeout(function () {
          showFallback();
          btnIOS.style.display = 'none'; // Android user doesn't need iOS button
        }, 2000);

      } else if (isIOS) {
        // Try custom scheme; if app isn't installed, redirect to App Store after timeout
        window.location.href = DEEP_LINK_IOS;
        setTimeout(function () {
          // If page is still visible after 1.5s, app likely isn't installed
          if (!document.hidden) {
            window.location.href = APP_STORE;
          }
        }, 1500);
        // Also show fallback buttons after a bit longer
        setTimeout(function () {
          showFallback();
          btnAndroid.style.display = 'none'; // iOS user doesn't need Android button
        }, 2500);

      } else {
        // Desktop — no deep link, just show download CTAs
        spinnerWrap.style.display = 'none';
        cardTitle.textContent = 'Gist is a mobile app';
        cardSub.textContent   = 'Download it on Android or iPhone to log in.';
        fallback.classList.add('visible');
        desktopNote.classList.add('visible');
      }
    })();
  </script>
</body>
</html>
